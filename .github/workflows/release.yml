name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo clone "${GITHUB_REPOSITORY}" . -- --depth 1 --branch "${GITHUB_REF_NAME}"

      - name: Install JS dependencies
        working-directory: js
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Build JS
        working-directory: js
        run: yarn build

      - name: Stamp version into composer.json
        run: |
          python3 -c "
          import json
          with open('composer.json') as f: c = json.load(f)
          c['version'] = '${GITHUB_REF_NAME#v}'
          with open('composer.json', 'w') as f: json.dump(c, f, indent=4)
          "

      - name: Build release archive
        run: |
          tar -czf "/tmp/grapheneos-flarum-captcha-${GITHUB_REF_NAME}.tar.gz" \
            --exclude='.git' \
            --exclude='js/node_modules' \
            --exclude='js/src' \
            --exclude='js/package.json' \
            --exclude='js/package-lock.json' \
            --exclude='js/webpack.config.js' \
            .
          mv "/tmp/grapheneos-flarum-captcha-${GITHUB_REF_NAME}.tar.gz" .

      - name: Attest release archive
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "grapheneos-flarum-captcha-${{ github.ref_name }}.tar.gz"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            "grapheneos-flarum-captcha-${GITHUB_REF_NAME}.tar.gz"
